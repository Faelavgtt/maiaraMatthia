name = "maiara-matthia-api"
main = "worker/src/index.ts"
compatibility_date = "2026-07-16"

[vars]
APP_ORIGIN = "http://localhost:8080"
ADMIN_EMAILS = ""
WHATSAPP_NUMBER = ""

[[d1_databases]]
binding = "DB"
database_name = "maiara_orders"
database_id = "replace-with-cloudflare-d1-database-id"

[[r2_buckets]]
binding = "FILES"
bucket_name = "maiara-order-files"

